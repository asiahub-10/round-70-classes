<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .remove{
            color: crimson;
        }
        li{
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div>
        <input type="text">
        <button>Add</button>
        <div>
            <ul></ul>
        </div>
    </div>
    
    <script src="js/jquery-4.0.0.min.js"></script>
    <script>
        $("button").click(function(){
            let val = $("input").val();
            // $("ul").append("<li>" + val + "</li>");
            $("ul").append(`<li> ${val} <button class="remove">&times;</button></li>`);
            $("input").val("");
        });
        $("ul").on("click",".remove",(e)=>{
            // console.log(e.target.closest("li"));
            e.target.closest("li").remove();
        });
    </script>
</body>
</html>
