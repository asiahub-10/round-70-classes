<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .red{
            color: red;
        }
        .font{
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <p>Paragraph 1</p>
    <p class="red">Paragraph 2</p>
    <p>Paragraph 3</p>
    <p>Paragraph 4</p>
    <p>Paragraph 5</p>
    <p>Paragraph 6</p>
    <button class="add-class">Red Text</button>
    <button class="remove-class">Black Text</button>
    <button class="toggle-class">Change Color</button>
    <script src="js/jquery-4.0.0.min.js"></script>
    <script>
       $(".add-class").click(()=>{
           $("p:nth-child(odd)").addClass("red font");
       });
       $(".remove-class").click(()=>{
           $("p:nth-child(odd)").removeClass("red font");
       });
       $(".toggle-class").click(()=>{
           $("p:nth-child(even)").toggleClass("red");
       });
       console.log($("p:nth-child(2)").hasClass("red"));
    </script>
</body>
</html>
